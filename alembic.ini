[alembic]
script_location = glasswing/storage/migrations
prepend_sys_path = .
path_separator = os
# Overridden at runtime by env.py from the GLASSWING_DB_URL environment
# variable when set; this is only the fallback for local `alembic` CLI use.
sqlalchemy.url = sqlite:///glasswing.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
